# main 分支 / PR 触发的构建
# tag 发布见 release.yml（无条件触发）
#
# paths 过滤：只构建相关文件变更时才跑，避免 README/docs 改动浪费 CI。
# 限制：GitHub paths 不检测 submodule 指针变更（openvohive/src 等），
#   升级 submodule 时若仅改指针，需手动 workflow_dispatch 触发。
name: Build (main/PR)

on:
  push:
    branches: [main]
    paths:
      - 'openvohive/**'
      - 'vohive-legacy/**'
      - 'dji2quectel/**'
      - 'assets/**'
      - 'scripts/fetch-assets.sh'
      - 'docker-bake.hcl'
      - 'docker-compose.yml'
      - '.github/workflows/build.yml'
      - '.github/workflows/build-images.yml'
  pull_request:
    branches: [main]
    paths:
      - 'openvohive/**'
      - 'vohive-legacy/**'
      - 'dji2quectel/**'
      - 'assets/**'
      - 'scripts/fetch-assets.sh'
      - 'docker-bake.hcl'
      - 'docker-compose.yml'
      - '.github/workflows/build.yml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch: {}

jobs:
  build:
    # main push 推送；PR 只验证不推送
    uses: ./.github/workflows/build-images.yml
    with:
      push: ${{ github.event_name != 'pull_request' }}
